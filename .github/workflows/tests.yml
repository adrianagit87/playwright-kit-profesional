name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    # Container oficial de Playwright: navegadores PREINSTALADOS.
    # `npx playwright install` se cuelga en los runners de GitHub
    # (la descarga termina y el proceso queda zombi), así que lo
    # eliminamos de la ecuación. La versión del container DEBE
    # coincidir con la de @playwright/test en package-lock.json.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v5

      - name: Instalar dependencias
        run: npm ci

      # Los tests @revela-bug fallan A PROPÓSITO contra el playground
      # (revelan sus bugs intencionales — ver tests/README.md). El CI los
      # excluye para validar solo lo que debe estar verde; corrélos local
      # para vivir la experiencia de encontrar los bugs.
      - name: Ejecutar tests (sin los que revelan bugs del playground)
        run: npx playwright test --project=chromium --grep-invert "@revela-bug"
        env:
          HOME: /root

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
