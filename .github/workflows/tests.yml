name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar navegadores de Playwright
        run: npx playwright install --with-deps

      # Los tests @revela-bug fallan A PROPÓSITO contra el playground
      # (revelan sus bugs intencionales — ver tests/README.md). El CI los
      # excluye para validar solo lo que debe estar verde; corrélos local
      # para vivir la experiencia de encontrar los bugs.
      - name: Ejecutar tests (sin los que revelan bugs del playground)
        run: npx playwright test --grep-invert "@revela-bug"

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
